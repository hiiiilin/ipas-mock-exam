// Custom tooltip — 解決 Recharts Bar+Line 共享 dataKey 的重複顯示
// 同時統一 editorial 風格的色塊 + 名稱 + 值排版
const CustomTooltip = ({ active, payload, label, valueFormatter }) => {
  if (!active || !payload || !payload.length) return null;

  // 依 name 去重（Bar 和 Line 共用同 dataKey 時會出現兩筆）
  const seen = new Map();
  payload.forEach(p => {
    const key = p.name || p.dataKey;
    if (!seen.has(key)) seen.set(key, p);
  });
  const items = [...seen.values()];

  const titleText = payload[0]?.payload?.full || label;

  return (
    <div style={{
      background: 'var(--paper)',
      border: '1px solid var(--ink)',
      padding: '10px 14px',
      boxShadow: '4px 4px 0 var(--rule)',
      minWidth: 180,
    }}>
      <div style={{
        fontFamily: "'Fraunces', 'Noto Serif TC', serif",
        fontWeight: 600,
        color: 'var(--ink)',
        marginBottom: 8,
        fontSize: 13,
        borderBottom: '1px solid var(--rule)',
        paddingBottom: 6,

        {titleText}
      </div>
      {items.map((p, i) => (
        <div key={i} style={{
          fontFamily: "'IBM Plex Mono', monospace",
          fontSize: 12,
          padding: '3px 0',
          display: 'flex',
          alignItems: 'center',

            height: 9,
            background: p.color || p.stroke || p.fill,
            flexShrink: 0,
          }} />
          <span style={{color: 'var(--ink-soft)'}}>{p.name}</span>
          <span style={{
            marginLeft: 'auto',
            fontWeight: 600,
            color: 'var(--ink)',
            fontVariantNumeric: 'tabular-nums',
          }}>
            {valueFormatter ? valueFormatter(p.value) : p.value}
          </span>
        </div>
      ))}
    </div>
  );
};

const getStats = (rows) => {
  const subj1 = rows.reduce((s, r) => s + r.subjects[0].passRate, 0) / rows.length;
  const subj2 = rows.reduce((s, r) => s + r.subjects[1].passRate, 0) / rows.length;
  const cert = rows.reduce((s, r) => s + r.certRate, 0) / rows.length;
  const totalReg = rows.reduce((s, r) => s + r.registrants, 0);
  const avgReg = totalReg / rows.length;
  const latest = rows.reduce((a, b) =>
    (b.year > a.year || (b.year === a.year && b.session > a.session)) ? b : a, rows[0]);
  let minCert = rows[0], maxCert = rows[0];
  rows.forEach(r => {
    if (r.certRate < minCert.certRate) minCert = r;
    if (r.certRate > maxCert.certRate) maxCert = r;
  });
  return { subj1, subj2, cert, totalReg, avgReg, latest, minCert, maxCert };
};

          <span className="font-display italic text-sm" style={{color: 'var(--ink-mute)'}}>
            At a glance — {level === '初級' ? 'Associate level' : 'Specialist level'}
          </span>
        </div>

        <div className="grid grid-cols-3 md:grid-cols-6 border-l border-t" style={{borderColor: 'var(--rule)'}}>
          {spec.items.map((it, i) => (
            <div key={i}
                 className="px-4 md:px-5 py-5 md:py-6 border-r border-b"
                 style={{borderColor: 'var(--rule)'}}>
              <div className="flex items-baseline justify-between mb-3">
                <span className="font-serif-tc text-xs font-medium" style={{color: 'var(--ink-soft)'}}>
                  {it.label}
                </span>
                <span className="font-mono text-[9px] tracking-widest uppercase" style={{color: 'var(--ink-mute)'}}>
                  {it.en}
                </span>
              </div>
              <div className="font-display font-light leading-none num-tnum" style={{color: 'var(--ink)', fontSize: it.value.length > 3 ? '1.6rem' : '2.25rem'}}>
                {it.value}
              </div>
              {it.unit && (
                <div className="font-serif-tc text-xs mt-2" style={{color: 'var(--ink-mute)'}}>
                  {it.unit}
                </div>
              )}
            </div>
          ))}
        </div>
      </div>
    </section>
  );
};

const LeadStats = ({ stats, level, subjects }) => {
  const cells = [
    { label: '累計核發證書', value: TOTAL_CERTS[level].toLocaleString(), unit: '張', emphasis: true },
    { label: '平均報考人數', value: fmtInt(stats.avgReg), unit: '人 / 場' },
    { label: '平均獲證率', value: fmt1(stats.cert), unit: '%' },
    { label: `${subjects[0]}平均通過`, value: fmt1(stats.subj1), unit: '%' },
    { label: `${subjects[1]}平均通過`, value: fmt1(stats.subj2), unit: '%' },
  ];

  return (
    <section className="relative z-10 max-w-6xl mx-auto px-6 md:px-10 py-12 md:py-16">
      <div className="rule-double-top pt-10 grid grid-cols-2 md:grid-cols-5 gap-y-10 gap-x-6">
        {cells.map((c, i) => (
          <div key={i} className={i === 0 ? 'col-span-2 md:col-span-1' : ''}>
            <div className="section-num mb-3 text-[10px]">{String(i + 1).padStart(2, '0')}</div>
            <div className="font-display font-light leading-none num-tnum"
                 style={{
                   color: c.emphasis ? 'var(--crimson-deep)' : 'var(--ink)',
                   fontSize: c.emphasis ? '3.5rem' : '3rem'
                 }}>
              {c.value}
            </div>
            <div className="font-mono text-[11px] tracking-wider mt-2" style={{color: 'var(--ink-mute)'}}>
              {c.unit}
            </div>
            <div className="font-serif-tc text-sm mt-2" style={{color: 'var(--ink-soft)'}}>
              {c.label}
            </div>
          </div>
        ))}
      </div>
    </section>
  );
};

const SectionHeader = ({ num, kicker, title, lead }) => (
  <div className="mb-8 md:mb-12">
    <div className="flex items-center gap-3 mb-4">
      <span className="font-mono text-base font-medium" style={{color: 'var(--crimson-deep)'}}>{num}</span>
      <span className="section-num" style={{color: 'var(--ink-soft)'}}>—— {kicker}</span>
    </div>
    <h2 className="font-serif-tc text-3xl md:text-5xl font-medium leading-tight mb-5" style={{color: 'var(--ink)'}}>
      {title}
    </h2>
    {lead && (
      <p className="font-body text-lg md:text-xl leading-relaxed max-w-3xl" style={{color: 'var(--ink-soft)'}}>
        {lead}
      </p>
    )}
  </div>
);

const RegistrantsSection = ({ data, level, stats }) => {
  const sorted = sortAsc(data);
  const chartData = sorted.map(r => ({
    label: `${r.year}-${r.session}`,
    full: `${r.year}年第${r.session}次`,
    報考人數: r.registrants,
  }));

  const peak = chartData.reduce((a, b) => b.報考人數 > a.報考人數 ? b : a);
  const trough = chartData.reduce((a, b) => b.報考人數 < a.報考人數 ? b : a);

  return (
    <section className="relative z-10 max-w-6xl mx-auto px-6 md:px-10 py-12 md:py-20 fade-up">
      <SectionHeader
        num="01"
        kicker="REGISTRANTS / 報考人數"
        title="從個位數到千人規模"
        lead={`${level}認證自開辦以來，報考人數呈長期上升趨勢。最低點${trough.full}僅 ${fmtInt(trough.報考人數)} 人，最高峰${peak.full}達 ${fmtInt(peak.報考人數)} 人，顯示資安人才需求被市場用「報名動作」明確投了一票。`}
      />

      <div className="md:grid md:grid-cols-12 md:gap-10 items-start">
        <div className="md:col-span-8">
          <div className="h-72 md:h-96 -mx-2">
            <ResponsiveContainer width="100%" height="100%">
              <ComposedChart data={chartData} margin={{ top: 10, right: 10, left: -10, bottom: 0 }}>
                <CartesianGrid stroke={C.rule} vertical={false} />
                <XAxis dataKey="label" tickLine={false} axisLine={{ stroke: C.ink }} interval={0} angle={-30} textAnchor="end" height={50} />
                <YAxis tickLine={false} axisLine={false} />
                <Tooltip
                  cursor={{ fill: 'rgba(158, 42, 43, 0.06)' }}
                  content={<CustomTooltip valueFormatter={(v) => `${fmtInt(v)} 人`} />}
                />
                <Bar dataKey="報考人數" fill={C.navy} radius={[2, 2, 0, 0]} barSize={28} />
                <Line type="monotone" dataKey="報考人數" stroke={C.crimson} strokeWidth={1.5} dot={{ r: 3, fill: C.crimson, stroke: 'none' }} activeDot={{ r: 5 }} />
              </ComposedChart>
            </ResponsiveContainer>
          </div>
          <div className="font-mono text-[11px] uppercase tracking-widest mt-3" style={{color: 'var(--ink-mute)'}}>
            Fig.&nbsp;1 — Registrants per session, sorted chronologically
          </div>
        </div>

        <aside className="md:col-span-4 mt-10 md:mt-0">
          <div className="pullquote text-xl md:text-2xl leading-relaxed">
            <span className="font-serif-tc">「資安缺工」</span>不再只是<br/>
            產業報告的標題，<br/>
            而是&nbsp;
            <span className="font-display not-italic font-medium" style={{color: 'var(--crimson-deep)'}}>{fmtInt(stats.totalReg)}</span>
            &nbsp;個<br/>
            真實的報名動作。
          </div>
          <div className="mt-8 grid grid-cols-2 gap-4 rule-top pt-6">
            <div>
              <div className="section-num text-[10px] mb-1">最高峰</div>
              <div className="font-display text-2xl font-medium num-tnum" style={{color: 'var(--ink)'}}>{fmtInt(peak.報考人數)}</div>
              <div className="font-serif-tc text-xs mt-1" style={{color: 'var(--ink-soft)'}}>{peak.full}</div>
            </div>
            <div>
              <div className="section-num text-[10px] mb-1">最低谷</div>
              <div className="font-display text-2xl font-medium num-tnum" style={{color: 'var(--ink-mute)'}}>{fmtInt(trough.報考人數)}</div>
              <div className="font-serif-tc text-xs mt-1" style={{color: 'var(--ink-soft)'}}>{trough.full}</div>
            </div>
          </div>
        </aside>
      </div>
    </section>
  );
};

const PassRateSection = ({ data, level, stats, subjects }) => {
  const sorted = sortAsc(data);
  const chartData = sorted.map(r => ({
    label: `${r.year}-${r.session}`,
    full: `${r.year}年第${r.session}次`,
    [subjects[0]]: r.subjects[0].passRate,
    [subjects[1]]: r.subjects[1].passRate,
    獲證率: r.certRate,
  }));

  const gap = stats.subj1 - stats.subj2;
  const harderSubject = stats.subj1 < stats.subj2 ? subjects[0] : subjects[1];

  return (
    <section className="relative z-10 py-12 md:py-20 fade-up" style={{background: 'var(--paper-deep)'}}>
      <div className="max-w-6xl mx-auto px-6 md:px-10">
        <SectionHeader
          num="02"
          kicker="PASS RATE / 通過率與獲證率"
          title={gap >= 0 ? `${subjects[0]}領先 ${subjects[1]}` : `${subjects[1]}領先 ${subjects[0]}`}
          lead={`兩科的平均通過率差距 ${fmt1(Math.abs(gap))} 個百分點，獲證率（兩科皆過）始終低於任一科的通過率，這條曲線是「兩科同時過」的真實難度。`}
        />

        <div className="h-80 md:h-[28rem] -mx-2">
          <ResponsiveContainer width="100%" height="100%">
            <ComposedChart data={chartData} margin={{ top: 10, right: 10, left: -10, bottom: 0 }}>
              <CartesianGrid stroke={C.rule} vertical={false} />
              <XAxis dataKey="label" tickLine={false} axisLine={{ stroke: C.ink }} interval={0} angle={-30} textAnchor="end" height={50} />
              <YAxis domain={[0, 100]} tickLine={false} axisLine={false} unit="%" />
              <Tooltip
                cursor={{ fill: 'rgba(158, 42, 43, 0.06)' }}
                content={<CustomTooltip valueFormatter={(v) => `${fmt2(v)}%`} />}
              />
              <Legend
                iconType="square"
                wrapperStyle={{ paddingTop: 16 }}
                formatter={(value) => <span style={{ marginRight: 12, color: 'var(--ink)' }}>{value}</span>}
              />
              <Bar dataKey={subjects[0]} fill={C.navy} radius={[2, 2, 0, 0]} barSize={14} />
              <Bar dataKey={subjects[1]} fill={C.rust} radius={[2, 2, 0, 0]} barSize={14} />
              <Line type="monotone" dataKey="獲證率" stroke={C.crimson} strokeWidth={2.5} dot={{ r: 4, fill: C.crimson, stroke: C.paper, strokeWidth: 1.5 }} activeDot={{ r: 6 }} />
            </ComposedChart>
          </ResponsiveContainer>
        </div>
        <div className="font-mono text-[11px] uppercase tracking-widest mt-3" style={{color: 'var(--ink-mute)'}}>
          Fig.&nbsp;2 — Pass rate per subject vs. overall certification rate
        </div>

        <div className="grid md:grid-cols-3 gap-6 md:gap-10 mt-12 rule-top pt-8">
          <div>
            <div className="flex items-center gap-2 mb-3">
              <span className="inline-block w-3 h-3" style={{background: C.navy}}></span>
              <span className="font-serif-tc text-sm" style={{color: 'var(--ink-soft)'}}>{subjects[0]}</span>
            </div>
            <div className="font-display text-4xl font-light num-tnum" style={{color: 'var(--ink)'}}>{fmt1(stats.subj1)}<span className="text-2xl">%</span></div>
            <div className="font-serif-tc text-xs mt-2" style={{color: 'var(--ink-mute)'}}>歷年平均通過率</div>
          </div>
          <div>
            <div className="flex items-center gap-2 mb-3">
              <span className="inline-block w-3 h-3" style={{background: C.rust}}></span>
              <span className="font-serif-tc text-sm" style={{color: 'var(--ink-soft)'}}>{subjects[1]}</span>
            </div>
            <div className="font-display text-4xl font-light num-tnum" style={{color: 'var(--ink)'}}>{fmt1(stats.subj2)}<span className="text-2xl">%</span></div>
            <div className="font-serif-tc text-xs mt-2" style={{color: 'var(--ink-mute)'}}>歷年平均通過率</div>
          </div>
          <div>
            <div className="flex items-center gap-2 mb-3">
              <span className="inline-block w-4 h-0.5" style={{background: C.crimson}}></span>
              <span className="font-serif-tc text-sm" style={{color: 'var(--ink-soft)'}}>整體獲證率</span>
            </div>
            <div className="font-display text-4xl font-light num-tnum" style={{color: 'var(--crimson-deep)'}}>{fmt1(stats.cert)}<span className="text-2xl">%</span></div>
            <div className="font-serif-tc text-xs mt-2" style={{color: 'var(--ink-mute)'}}>兩科皆通過比例</div>
          </div>
        </div>
      </div>
    </section>
  );
};

const ObservationsSection = ({ data, level, stats, subjects }) => {
  const harderSubject = stats.subj1 < stats.subj2 ? subjects[0] : subjects[1];
  const easierSubject = stats.subj1 < stats.subj2 ? subjects[1] : subjects[0];
  const harderRate = Math.min(stats.subj1, stats.subj2);
  const easierRate = Math.max(stats.subj1, stats.subj2);
  const avgPass = (stats.subj1 + stats.subj2) / 2;
  const certGap = avgPass - stats.cert;

  const observations = [
    {
      kicker: 'Subject difficulty',
      title: `${harderSubject}始終是難關`,
      body: `平均通過率僅 ${fmt1(harderRate)}%，比${easierSubject}的 ${fmt1(easierRate)}% 低了 ${fmt1(easierRate - harderRate)} 個百分點。${level === '初級' ? '從歷年資料看，技術概論的離散程度遠大於管理概論' : '中級兩科都偏實務，但防護實務的計算題與情境題比規劃實務更吃實作經驗'}。`
    },
    {
      kicker: 'Certification gap',
      title: '兩科皆過的隱形折扣',
      body: `兩科平均通過率 ${fmt1(avgPass)}%，但平均獲證率只有 ${fmt1(stats.cert)}%——中間掉了 ${fmt1(certGap)} 個百分點。這個差距正是「同一場兩科都要過」的本質難度。`
    },
    {
      kicker: 'Best & worst',
      title: '高低之間，相差三倍以上',
      body: `${stats.maxCert.year} 年第 ${stats.maxCert.session} 次獲證率達到歷史高點 ${fmt1(stats.maxCert.certRate)}%；最低谷則出現在 ${stats.minCert.year} 年第 ${stats.minCert.session} 次，僅 ${fmt1(stats.minCert.certRate)}%。命題穩定度仍是這份鑑定還能進化的方向。`
    },
    {
      kicker: 'Strategy',
      title: '70 分通過策略',
      body: `每科 100 分制、70 分為合格。與其追求滿分，不如把火力集中在常考題型——${level === '初級' ? '管理概論的政策法規、技術概論的資安攻防基本盤' : '規劃實務的標準/流程、防護實務的工具與技術細節'}——拿穩 70 分，獲證率自然抬升。`
    }
  ];

  return (
    <section className="relative z-10 max-w-6xl mx-auto px-6 md:px-10 py-12 md:py-20 fade-up">
      <SectionHeader
        num="03"
        kicker="EDITOR'S NOTE / 編輯觀察"
        title="四個值得記住的數字觀察"
      />

      <div className="grid md:grid-cols-2 gap-x-12 gap-y-10 md:gap-y-14">
        {observations.map((o, i) => (
          <article key={i} className="md:[&:nth-child(odd)]:rule-bottom md:[&:nth-child(odd)]:pb-10">
            <div className="flex items-baseline gap-3 mb-3">
              <span className="font-display text-3xl font-light num-tnum" style={{color: 'var(--crimson-deep)'}}>
                {String(i + 1).padStart(2, '0')}
              </span>
              <span className="section-num">{o.kicker}</span>
            </div>
            <h3 className="font-serif-tc text-2xl md:text-3xl font-medium leading-tight mb-4" style={{color: 'var(--ink)'}}>
              {o.title}
            </h3>
            <p className="font-body leading-relaxed text-base md:text-lg" style={{color: 'var(--ink-soft)'}}>
              {o.body}
            </p>
          </article>
        ))}
      </div>
    </section>
  );
};

const Colophon = () => (
  <footer className="relative z-10 mt-12 md:mt-20" style={{background: 'var(--ink)', color: 'var(--paper)'}}>
    <div className="max-w-6xl mx-auto px-6 md:px-10 py-10 md:py-14">
      <div className="grid md:grid-cols-2 gap-8 md:gap-12">
        <div>
          <div className="font-mono text-[11px] uppercase tracking-widest mb-4" style={{color: 'var(--rule)'}}>Source / 資料來源</div>
          <div className="font-serif-tc text-base leading-relaxed">
            經濟部產業人才能力鑑定推動網<br/>
            <span style={{color: 'var(--rule)'}}>iPAS 資訊安全工程師專區</span>
          </div>
          <a href="https://www.ipas.org.tw/ISE" target="_blank" rel="noopener" className="font-mono text-xs mt-3 inline-block underline" style={{color: 'var(--paper)'}}>www.ipas.org.tw/ISE</a>
        </div>
        <div>
          <div className="font-mono text-[11px] uppercase tracking-widest mb-4" style={{color: 'var(--rule)'}}>Methodology / 取樣說明</div>
          <div className="font-serif-tc text-sm leading-relaxed" style={{color: 'var(--rule)'}}>
            初級&nbsp;107 年第 1 次起至 114 年第 2 次<br/>
            中級&nbsp;108 年起至 115 年第 1 次<br/>
            通過率以四捨五入後百分比計算<br/>
            <span className="font-display italic" style={{color: 'var(--ink-mute)'}}>※ 民間整理，非官方統計；如與官方數據出入以官方為準</span>
          </div>
        </div>
      </div>
      <div className="rule-top mt-10 pt-6 flex items-center justify-between">
        <div className="font-display italic text-sm" style={{color: 'var(--rule)'}}>— End of Report —</div>
        <div className="font-mono text-[10px] uppercase tracking-widest" style={{color: 'var(--rule)'}}>
          Issue / 115 · 01
        </div>
      </div>
    </div>
  </footer>
);

// =============== ROOT ===============
const App = () => {
  const [level, setLevel] = useState('初級');
  const data = DATA[level];
  const subjects = level === '初級' ? ['管理概論', '技術概論'] : ['規劃實務', '防護實務'];
  const stats = useMemo(() => getStats(data), [level]);

  return (
    <div className="relative">
      <Masthead level={level} setLevel={setLevel} />
      <Hero level={level} setLevel={setLevel} stats={stats} latest={stats.latest} />
      <ExamSpec level={level} />
      <LeadStats stats={stats} level={level} subjects={subjects} />
      <RegistrantsSection data={data} level={level} stats={stats} />
      <PassRateSection data={data} level={level} stats={stats} subjects={subjects} />
      <ObservationsSection data={data} level={level} stats={stats} subjects={subjects} />
      <Colophon />
    </div>
  );
};

const root = createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
