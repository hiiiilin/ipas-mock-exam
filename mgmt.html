<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>資訊安全模擬測驗系統 — 管理概論（非官方練習用）</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: "Microsoft JhengHei", "微軟正黑體", "新細明體", PMingLiU, sans-serif;
  background: #b8c4d4;
  background-image: linear-gradient(135deg, #d8e0ec 0%, #b0bccc 100%);
  min-height: 100vh;
  color: #000;
  font-size: 14px;
  user-select: none;
}

.app-window {
  max-width: 1080px;
  margin: 20px auto;
  background: #f0f0f0;
  border: 1px solid #7b8a9c;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  min-height: 680px;
  display: flex;
  flex-direction: column;
}

.app-titlebar {
  background: linear-gradient(to bottom, #4a6fa5 0%, #3d5d8f 100%);
  color: #fff;
  padding: 4px 10px;
  font-size: 13px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.app-titlebar .controls { display: flex; gap: 2px; }

.app-titlebar .ctrl-btn {
  width: 22px; height: 18px;
  background: #5b7fb5;
  border: 1px solid #2d4870;
  color: #fff;
  font-size: 11px;
  text-align: center;
  line-height: 16px;
}

.app-header {
  background: #f0f0f0;
  padding: 8px 14px;
  border-bottom: 1px solid #c0c0c0;
  display: flex;
  align-items: center;
  gap: 12px;
}

.ipas-logo {
  font-weight: 700;
  color: #8c1d2c;
  font-size: 20px;
  letter-spacing: 1px;
  font-family: Arial, sans-serif;
}

.ipas-logo .check { color: #2d8a6e; font-size: 22px; }

.ipas-subtitle {
  color: #333;
  font-size: 13px;
  border-left: 2px solid #c0c0c0;
  padding-left: 12px;
  line-height: 1.3;
}

.ipas-subtitle .en { color: #666; font-size: 10px; }

.stage { flex: 1; padding: 24px; background: #fff; position: relative; }

/* 登入畫面 */
.mini-notice {
  max-width: 680px;
  margin: 0 auto 20px;
  padding: 10px 16px;
  background: #fff8e7;
  border: 1px solid #e0b95e;
  border-radius: 4px;
  text-align: center;
  font-size: 12px;
  color: #8b6914;
}
.mini-notice a {
  text-decoration: none;
  font-weight: 600;
  margin-left: 8px;
}
.mini-notice a:hover {
  text-decoration: underline;
}
.disclaimer-box {
  max-width: 540px;
  margin: 0 auto 20px;
  padding: 14px 18px;
  background: #fff9e6;
  border: 1px solid #d9b85c;
  border-left: 4px solid #d4a024;
  border-radius: 2px;
  font-size: 12.5px;
  line-height: 1.75;
  color: #5c4a10;
}

.disclaimer-box .dc-title {
  font-weight: 700;
  color: #8a6410;
  margin-bottom: 6px;
  letter-spacing: 1px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.disclaimer-box .dc-title::before {
  content: "⚠";
  font-size: 16px;
}

.disclaimer-box ul {
  padding-left: 20px;
  margin: 4px 0;
}

.disclaimer-box li {
  margin-bottom: 2px;
}

.disclaimer-box .dc-ack {
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px dashed #d9b85c;
  font-size: 12px;
  color: #6a5420;
}

.login-box {
  max-width: 440px;
  margin: 0 auto;
  border: 1px solid #4a6fa5;
  background: #f8f9fc;
}

.login-title {
  background: linear-gradient(to bottom, #e8eef7 0%, #d0dae8 100%);
  border-bottom: 1px solid #4a6fa5;
  padding: 16px;
  text-align: center;
}

.login-title h2 {
  font-size: 22px;
  color: #2c4870;
  letter-spacing: 3px;
  font-weight: 500;
}

.login-title .ver {
  display: block;
  text-align: right;
  font-size: 11px;
  color: #888;
  margin-top: 4px;
  font-family: "Courier New", monospace;
}

.login-body { padding: 40px 32px; }

.login-field {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 32px;
}

.login-field label { font-size: 14px; color: #333; min-width: 72px; }

.login-field input {
  flex: 1;
  padding: 5px 8px;
  border: 1px solid #7b8a9c;
  background: #fff;
  font-size: 14px;
  font-family: "Courier New", monospace;
}

.login-field input:focus {
  outline: none;
  border-color: #4a6fa5;
  box-shadow: inset 0 0 2px rgba(74,111,165,0.3);
}

.login-buttons { text-align: center; display: flex; justify-content: center; gap: 16px; }

.win-btn {
  background: linear-gradient(to bottom, #fafafa 0%, #d8dde3 100%);
  border: 1px solid #7b8a9c;
  border-radius: 2px;
  padding: 5px 22px;
  font-size: 13px;
  font-family: inherit;
  color: #000;
  cursor: pointer;
  min-width: 72px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.6);
}

.win-btn:hover {
  background: linear-gradient(to bottom, #fff 0%, #e8ecf2 100%);
  border-color: #4a6fa5;
}

.win-btn:active {
  background: linear-gradient(to bottom, #c8ced6 0%, #dde2e8 100%);
  box-shadow: inset 0 1px 2px rgba(0,0,0,0.15);
}

.win-btn:disabled { color: #888; background: #e8e8e8; cursor: not-allowed; }

.win-btn.primary {
  background: linear-gradient(to bottom, #5b8ac0 0%, #3d6a9f 100%);
  color: #fff;
  border-color: #2c4870;
  font-weight: 500;
}

.win-btn.primary:hover {
  background: linear-gradient(to bottom, #6a99cf 0%, #4a77ac 100%);
}

.key-hint-box {
  margin-top: 8px;
  padding: 10px 14px;
  background: #f5f8fc;
  border: 1px solid #c8d4e0;
  border-radius: 4px;
  font-size: 13px;
  line-height: 2;
}
.kbd {
  display: inline-block;
  min-width: 24px;
  padding: 2px 8px;
  margin: 0 2px;
  background: #fff;
  border: 1px solid #aaa;
  border-bottom-width: 2px;
  border-radius: 3px;
  font-family: "Consolas", monospace;
  font-size: 12px;
  font-weight: 600;
  text-align: center;
  color: #333;
  box-shadow: 0 1px 0 rgba(0,0,0,0.1);
}
.key-hint-sep {
  margin: 0 8px;
  color: #888;
  font-size: 12px;
}
.key-hint-desc {
  margin-left: 8px;
  color: #555;
  font-size: 12px;
}
.info-panel {
  border: 1px solid #7b8a9c;
  background: #fff;
}

.info-panel-header {
  background: linear-gradient(to bottom, #4a6fa5 0%, #3d5d8f 100%);
  color: #fff;
  padding: 0;
  font-size: 13px;
  display: flex;
  align-items: stretch;
  border-bottom: 1px solid #2c4870;
}

.info-panel-header .tab {
  display: inline-flex;
  align-items: center;
  padding: 8px 20px;
  background: linear-gradient(to bottom, #3d5d8f 0%, #2c4870 100%);
  color: #fff;
  border-right: 1px solid #2c4870;
  font-weight: 500;
}

.info-panel-header .tab-inactive {
  display: inline-flex;
  align-items: center;
  padding: 8px 20px;
  color: #c4d0e0;
  font-size: 12px;
}

.info-identity {
  background: linear-gradient(to bottom, #5b8ac0 0%, #3d6a9f 100%);
  color: #fff;
  padding: 5px 14px;
  font-size: 13px;
  display: flex;
  gap: 40px;
  letter-spacing: 0.5px;
}

.info-content {
  padding: 24px;
  min-height: 320px;
  line-height: 2;
  font-size: 14px;
  color: #000;
}

.info-content ol { padding-left: 0; list-style: none; }

.info-content li { margin-bottom: 12px; padding-left: 0; }

.info-footer {
  padding: 12px;
  text-align: center;
  background: #f5f5f5;
  border-top: 1px solid #c0c0c0;
}

.info-statusbar {
  background: #e8e8e8;
  padding: 4px 12px;
  font-size: 12px;
  color: #555;
  border-top: 1px solid #c0c0c0;
}

/* 考試畫面 */
.exam-frame {
  border: 1px solid #7b8a9c;
  background: #fff;
  display: flex;
  flex-direction: column;
  min-height: 560px;
}

.exam-topbar {
  background: linear-gradient(to bottom, #4a6fa5 0%, #3d5d8f 100%);
  color: #fff;
  padding: 0;
  display: flex;
  font-size: 13px;
  border-bottom: 1px solid #2c4870;
}

.exam-topbar .tab-active {
  padding: 8px 20px;
  background: linear-gradient(to bottom, #3d5d8f 0%, #2c4870 100%);
  color: #fff;
  border-right: 1px solid #2c4870;
  font-weight: 500;
}

.exam-identity-bar {
  background: linear-gradient(to bottom, #5b8ac0 0%, #3d6a9f 100%);
  color: #fff;
  padding: 5px 14px;
  font-size: 13px;
  display: flex;
  align-items: center;
  gap: 24px;
  letter-spacing: 0.5px;
}

.exam-identity-bar .progress {
  font-family: "Courier New", monospace;
  font-weight: 700;
}

.exam-identity-bar .timer {
  font-family: "Courier New", monospace;
  font-weight: 700;
  color: #ffe89a;
}

.exam-identity-bar .timer.warning {
  color: #ff9090;
  animation: flash 1s infinite;
}

@keyframes flash {
  0%, 50% { opacity: 1; }
  51%, 100% { opacity: 0.5; }
}

.exam-identity-bar .end-btn {
  margin-left: auto;
  background: linear-gradient(to bottom, #fafafa 0%, #d8dde3 100%);
  color: #000;
  border: 1px solid #2c4870;
  padding: 2px 12px;
  font-size: 13px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
}

.exam-identity-bar .end-btn::before {
  content: "⏻";
  color: #2d8a6e;
  font-weight: 700;
}

.exam-toolbar {
  background: #f0f0f0;
  padding: 6px 10px;
  border-bottom: 1px solid #c0c0c0;
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}

.exam-toolbar .win-btn {
  min-width: 88px;
  padding: 4px 14px;
  font-size: 13px;
}

.exam-toolbar .win-btn.marked {
  background: linear-gradient(to bottom, #fff4a0 0%, #f5d560 100%);
  border-color: #c09020;
}

.exam-toolbar .zoom-btn {
  min-width: 32px;
  padding: 2px 6px;
  font-size: 14px;
  margin-left: auto;
}

.question-area {
  padding: 22px 28px;
  flex: 1;
  font-size: 15px;
  line-height: 1.9;
  min-height: 360px;
}

.question-area.zoom-1 { font-size: 15px; }
.question-area.zoom-2 { font-size: 17px; }
.question-area.zoom-3 { font-size: 19px; }
.question-area.zoom-0 { font-size: 13px; }

.question-stem {
  font-weight: 700;
  margin-bottom: 14px;
  line-height: 1.7;
}

.question-stem .qnum { color: #000; margin-right: 6px; }

.options { margin-left: 0; }

.option-row {
  display: flex;
  align-items: flex-start;
  padding: 5px 4px;
  cursor: pointer;
  line-height: 1.7;
  border: 1px solid transparent;
}

.option-row:hover { background: #f0f5fc; }

.option-row input[type="radio"] {
  margin-right: 8px;
  margin-top: 6px;
  cursor: pointer;
  flex-shrink: 0;
}

.option-label { margin-right: 4px; font-weight: 500; }

.end-screen {
  padding: 80px 40px;
  text-align: center;
}

.end-screen h1 {
  font-size: 26px;
  color: #2c4870;
  font-weight: 500;
  letter-spacing: 4px;
  margin-bottom: 14px;
}

.end-screen p {
  color: #444;
  font-size: 14px;
  letter-spacing: 2px;
  margin-bottom: 40px;
}

.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.35);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 100;
}

.modal-overlay.show { display: flex; }

.modal-box {
  background: #f0f0f0;
  border: 1px solid #7b8a9c;
  box-shadow: 0 6px 24px rgba(0,0,0,0.3);
  min-width: 340px;
  max-width: 500px;
}

.modal-title {
  background: linear-gradient(to bottom, #4a6fa5 0%, #3d5d8f 100%);
  color: #fff;
  padding: 5px 10px;
  font-size: 13px;
  display: flex;
  justify-content: space-between;
}

.modal-body {
  padding: 20px 24px;
  display: flex;
  gap: 16px;
  align-items: flex-start;
  background: #fff;
}

.modal-icon {
  width: 32px; height: 32px;
  background: #fbbf24;
  border-radius: 50%;
  color: #fff;
  font-size: 22px;
  font-weight: 700;
  text-align: center;
  line-height: 32px;
  flex-shrink: 0;
}

.modal-text { flex: 1; line-height: 1.8; font-size: 13px; }

.modal-text .stats {
  margin-top: 12px;
  padding-top: 8px;
  border-top: 1px dashed #c0c0c0;
  font-family: "Courier New", monospace;
  font-size: 13px;
}

.modal-buttons {
  padding: 10px;
  text-align: center;
  background: #f0f0f0;
  border-top: 1px solid #c0c0c0;
  display: flex;
  justify-content: center;
  gap: 12px;
}

.modal-buttons .win-btn { min-width: 72px; }

.overview-modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.35);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 90;
}

.overview-modal.show { display: flex; }

.overview-box {
  background: #f0f0f0;
  border: 1px solid #7b8a9c;
  box-shadow: 0 6px 24px rgba(0,0,0,0.3);
  width: 560px;
  max-height: 80vh;
  display: flex;
  flex-direction: column;
}

.overview-title {
  background: linear-gradient(to bottom, #4a6fa5 0%, #3d5d8f 100%);
  color: #fff;
  padding: 5px 10px;
  font-size: 13px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.overview-title .close {
  cursor: pointer;
  width: 20px;
  text-align: center;
  background: #c94848;
  color: #fff;
  font-weight: 700;
  line-height: 18px;
}

.overview-body {
  background: #fff;
  padding: 16px;
  overflow-y: auto;
  flex: 1;
}

.overview-legend {
  display: flex;
  gap: 16px;
  font-size: 12px;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px dashed #c0c0c0;
  color: #555;
}

.legend-dot {
  display: inline-block;
  width: 10px; height: 10px;
  border-radius: 50%;
  margin-right: 4px;
  vertical-align: middle;
}

.legend-dot.g { background: #6abf4b; }
.legend-dot.y { background: #f5c518; }
.legend-dot.r { background: #d94040; }

.view-toggle {
  display: inline-flex;
  gap: 4px;
  margin-left: auto;
  margin-right: 12px;
}
.view-btn {
  width: 28px;
  height: 22px;
  border: 1px solid #7a92a8;
  background: #ecf0f1;
  cursor: pointer;
  font-size: 14px;
  line-height: 1;
  border-radius: 2px;
  color: #555;
}
.view-btn.active {
  background: #5a7ba5;
  color: #fff;
  border-color: #3a5a85;
}
.view-btn:hover:not(.active) {
  background: #d7e0e8;
}

.overview-list {
  max-height: 420px;
  overflow-y: auto;
  padding: 0;
  background: #fff;
}
.overview-list-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.overview-list-table thead th {
  background: #2c3e50;
  color: #fff;
  padding: 6px 8px;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 1;
  font-size: 13px;
}
.overview-list-table tbody tr {
  cursor: pointer;
  border-bottom: 1px solid #e0e0e0;
  transition: background 0.1s;
}
.overview-list-table tbody tr:hover {
  background: #e8f2fa !important;
}
.list-num {
  text-align: center;
  font-weight: 700;
  color: #fff;
  width: 55px;
  padding: 6px 0;
  font-size: 13px;
  vertical-align: middle;
}
.list-row.answered .list-num {
  background: #27ae60;
}
.list-row.marked .list-num {
  background: #f1c40f;
  color: #5d4a00;
}
.list-row.unanswered .list-num {
  background: #e74c3c;
}
.list-stem {
  padding: 6px 12px;
  color: #333;
  line-height: 1.5;
  word-break: break-word;
}

.overview-grid {
  display: grid;
  grid-template-columns: repeat(10, 1fr);
  gap: 6px;
}

.qnum-cell {
  aspect-ratio: 1.6;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  color: #fff;
  cursor: pointer;
  font-size: 13px;
  border: 1px solid rgba(0,0,0,0.2);
  background: #d94040;
  transition: transform 0.1s;
}

.qnum-cell:hover { transform: scale(1.08); box-shadow: 0 2px 6px rgba(0,0,0,0.25); }

.qnum-cell.answered { background: #6abf4b; }
.qnum-cell.marked { background: #f5c518; color: #000; }

.overview-footer {
  background: #f0f0f0;
  padding: 6px 10px;
  font-size: 11px;
  color: #666;
  border-top: 1px solid #c0c0c0;
  text-align: center;
}

/* 成績畫面 */
.result-screen { padding: 0; background: #fff; }

.result-header {
  background: linear-gradient(135deg, #2c4870 0%, #4a6fa5 100%);
  color: #fff;
  padding: 36px 40px;
  text-align: center;
  border-bottom: 3px solid #f0b429;
}

.result-header .result-subtitle {
  font-size: 13px;
  letter-spacing: 3px;
  opacity: 0.85;
  margin-bottom: 8px;
}

.result-header .result-title {
  font-size: 22px;
  letter-spacing: 2px;
  font-weight: 500;
}

.score-card {
  display: flex;
  padding: 32px 40px;
  gap: 32px;
  border-bottom: 1px solid #e0e0e0;
  background: #fafbfd;
}

.score-main { text-align: center; min-width: 200px; }

.score-number {
  font-size: 72px;
  font-weight: 700;
  font-family: "Courier New", monospace;
  line-height: 1;
}

.score-number.pass { color: #2d8a6e; }
.score-number.fail { color: #c94848; }

.score-label { font-size: 13px; color: #666; margin-top: 6px; letter-spacing: 2px; }

.score-verdict {
  display: inline-block;
  padding: 4px 14px;
  border-radius: 2px;
  font-size: 14px;
  margin-top: 10px;
  font-weight: 700;
  letter-spacing: 2px;
}

.score-verdict.pass { background: #e5f4eb; color: #2d8a6e; border: 1px solid #a6d8bd; }
.score-verdict.fail { background: #fbe9e9; color: #c94848; border: 1px solid #e6b0b0; }

.score-breakdown { flex: 1; }

.score-breakdown h3 {
  font-size: 14px;
  color: #2c4870;
  margin-bottom: 12px;
  font-weight: 500;
  letter-spacing: 1px;
}

.category-row {
  display: flex;
  align-items: center;
  margin-bottom: 10px;
  font-size: 13px;
}

.category-row .cat-name { min-width: 200px; color: #333; }

.category-row .cat-bar-wrap {
  flex: 1;
  height: 14px;
  background: #e8ecf2;
  border-radius: 7px;
  margin: 0 12px;
  overflow: hidden;
}

.category-row .cat-bar {
  height: 100%;
  background: linear-gradient(to right, #4a6fa5 0%, #5b8ac0 100%);
  border-radius: 7px;
  transition: width 0.6s ease-out;
}

.category-row .cat-bar.low { background: linear-gradient(to right, #c94848 0%, #e66060 100%); }
.category-row .cat-bar.mid { background: linear-gradient(to right, #d4a024 0%, #f0b429 100%); }

.category-row .cat-score {
  min-width: 60px;
  text-align: right;
  font-family: "Courier New", monospace;
  font-weight: 700;
  color: #2c4870;
}

.stats-summary {
  padding: 24px 40px;
  display: flex;
  gap: 40px;
  background: #f5f7fa;
  border-bottom: 1px solid #e0e0e0;
  font-size: 13px;
}

.stats-item { display: flex; flex-direction: column; gap: 2px; }

.stats-item .num {
  font-size: 24px;
  font-weight: 700;
  font-family: "Courier New", monospace;
  color: #2c4870;
}

.stats-item.correct .num { color: #2d8a6e; }
.stats-item.wrong .num { color: #c94848; }
.stats-item.blank .num { color: #999; }

.stats-item .lab { font-size: 12px; color: #666; letter-spacing: 1px; }

.review-section { padding: 28px 40px; }

// 保留一份原始題庫深複製，每次洗牌都從原始版重新生成，避免累積污染
const ORIGINAL_QUESTIONS = QUESTIONS.map(q => ({
  id: q.id,
  cat: q.cat,
  stem: q.stem,
  opts: [...q.opts],
  ans: q.ans,
  expl: q.expl
}));

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function shuffleExam() {
  // 從原始題庫深複製一份
  const fresh = ORIGINAL_QUESTIONS.map(q => ({
    id: q.id,
    cat: q.cat,
    stem: q.stem,
    opts: [...q.opts],
    ans: q.ans,
    expl: q.expl
  }));
  // 1. 打散題目順序
  const shuffled = shuffleArray(fresh);
  // 2. 每題內部打散選項順序，並更新 ans 指標
  shuffled.forEach(q => {
    const correctText = q.opts[q.ans];
    q.opts = shuffleArray(q.opts);
    q.ans = q.opts.indexOf(correctText);
  });
  // 3. 替換執行時題庫
  QUESTIONS.length = 0;
  QUESTIONS.push(...shuffled);
}

        <button class="win-btn primary" onclick="startExam()" style="min-width: 100px; padding: 6px 28px;">開 始</button>
      </div>
      <div class="info-statusbar">試卷資料已載入完成，請點擊「開始」按鈕進行計時練習。</div>
    </div>
  `;
}

function startExam() {
  state.stage = "exam";
  shuffleExam();              // 每次進入考試都重新洗牌（題目 + 選項）
  state.startTime = Date.now();
  state.remaining = TOTAL_TIME_SEC;
  startTimer();
  renderExam();
}

function startTimer() {
  if (state.timerId) clearInterval(state.timerId);
  state.timerId = setInterval(() => {
    state.remaining--;
    if (state.remaining <= 0) {
      state.remaining = 0;
      clearInterval(state.timerId);
      // 時間到自動交卷
      finalizeExam();
      return;
    }
    updateTimerDisplay();
  }, 1000);
}

function formatTime(sec) {
  const m = Math.floor(sec / 60).toString().padStart(2, "0");
  const s = (sec % 60).toString().padStart(2, "0");
  return `${m}:${s}`;
}

function updateTimerDisplay() {
  const el = document.getElementById("timerDisplay");
  if (!el) return;
  el.textContent = `${formatTime(state.remaining)} / ${formatTime(TOTAL_TIME_SEC)}`;
  if (state.remaining <= 300) {
    el.classList.add("warning");
  }
}

function renderExam() {
  const q = QUESTIONS[state.currentIdx];
  const total = QUESTIONS.length;
  const isMarked = !!state.marked[q.id];
  const userAns = state.answers[q.id];

  $stage.innerHTML = `
    <div class="exam-frame">
      <div class="exam-topbar">
        <div class="tab-active">學科測驗</div>
      </div>
      <div class="exam-identity-bar">
        <span>${EXAM_TITLE}</span>
        <span class="progress" id="progressDisplay">A${(state.currentIdx+1).toString().padStart(3,"0")} / A${total.toString().padStart(3,"0")}</span>
        <span class="timer" id="timerDisplay">${formatTime(state.remaining)} / ${formatTime(TOTAL_TIME_SEC)}</span>
        <button class="end-btn" onclick="confirmEndExam()">結束測驗</button>
      </div>
      <div class="exam-toolbar">
        <button class="win-btn" onclick="prevQuestion()" ${state.currentIdx === 0 ? 'disabled' : ''}>◁ 上一題</button>
        <button class="win-btn" onclick="nextQuestion()" ${state.currentIdx === total - 1 ? 'disabled' : ''}>下一題 ▷</button>
        <button class="win-btn" onclick="clearAnswer()">不作答</button>
        <button class="win-btn ${isMarked ? 'marked' : ''}" onclick="toggleMark()">${isMarked ? '★ 已標記' : '試題標記'}</button>
        <button class="win-btn" onclick="openOverview()">試題總覽</button>
        <button class="win-btn zoom-btn" onclick="zoomIn()" title="放大">🔍＋</button>
        <button class="win-btn zoom-btn" onclick="zoomOut()" title="縮小" style="margin-left:0;">🔍－</button>
      </div>
      <div class="question-area zoom-${state.zoomLevel}" id="questionArea">
        <div class="question-stem">
          <span class="qnum">${state.currentIdx + 1}.</span>${escapeHtml(q.stem)}
        </div>
        <div class="options">
          ${q.opts.map((opt, i) => `
            <label class="option-row">
              <input type="radio" name="opt" value="${i}" ${userAns === i ? 'checked' : ''} onchange="selectAnswer(${i})">
              <span class="option-label">(${String.fromCharCode(65+i)})</span>
              <span>${escapeHtml(opt)}</span>
            </label>
          `).join("")}
        </div>
      </div>
    </div>
  `;
}

function escapeHtml(s) {
  return (s || "").replace(/[&<>"']/g, c => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[c]));
}

function selectAnswer(i) {
  const q = QUESTIONS[state.currentIdx];
  state.answers[q.id] = i;
}

function clearAnswer() {
  const q = QUESTIONS[state.currentIdx];
  delete state.answers[q.id];
  renderExam();
}

function toggleMark() {
  const q = QUESTIONS[state.currentIdx];
  if (state.marked[q.id]) {
    delete state.marked[q.id];
  } else {
    state.marked[q.id] = true;
  }
  renderExam();
}

function prevQuestion() {
  if (state.currentIdx > 0) {
    state.currentIdx--;
    renderExam();
  }
}

function nextQuestion() {
  if (state.currentIdx < QUESTIONS.length - 1) {
    state.currentIdx++;
    renderExam();
  }
}

function zoomIn() {
  if (state.zoomLevel < 3) {
    state.zoomLevel++;
    renderExam();
  }
}

function zoomOut() {
  if (state.zoomLevel > 0) {
    state.zoomLevel--;
    renderExam();
  }
}

function calcResult() {
  const byCat = { A:{n:0,c:0}, B:{n:0,c:0}, C:{n:0,c:0}, D:{n:0,c:0} };
  let correct = 0, wrong = 0, blank = 0;
  QUESTIONS.forEach(q => {
    byCat[q.cat].n++;
    const a = state.answers[q.id];
    if (a === undefined) {
      blank++;
    } else if (a === q.ans) {
      correct++;
      byCat[q.cat].c++;
    } else {
      wrong++;
    }
  });
  const score = Math.round((correct / QUESTIONS.length) * 100);
  return { byCat, correct, wrong, blank, score, pass: score >= 70 };
}

function renderResult() {
  state.stage = "result";
  const r = calcResult();
  const scoreCls = r.pass ? "pass" : "fail";

  const catRows = ["A","B","C","D"].map(cat => {
    const info = r.byCat[cat];
    const pct = info.n > 0 ? Math.round((info.c / info.n) * 100) : 0;
    let barCls = "";
    if (pct < 60) barCls = "low";
    else if (pct < 75) barCls = "mid";
    return `
      <div class="category-row">

  const usedMin = Math.floor((TOTAL_TIME_SEC - state.remaining) / 60);

  $stage.innerHTML = `
    <div class="result-screen">

        </div>

const API_URL = "https://ipas-api.hiiii-lin.workers.dev/";

// ============================================================

// ============================================================
async function apiGet(action) {
  const url = `${API_URL}?action=${action}&subject=${SUBJECT_CODE}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error("API 回應失敗");
  return await res.json();
}

async function apiPost(data) {
  const res = await fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });
  if (!res.ok) throw new Error("API 上傳失敗");
  return await res.json();
}

async function loadChampionPreview() {
  const box = document.getElementById("loginChampion");
  if (!box) return;

  try {
    const result = await apiGet("leaderboard");
    const records = result.records || [];

    if (records.length === 0) {
      box.innerHTML = `<div class="champion-empty">🎯 尚無上榜紀錄，成為第一位登榜者！</div>`;
      return;
    }

    // 每人最高分
    const bestByName = {};
    records.forEach(r => {
      const cur = bestByName[r.name];
      if (!cur || r.score > cur.score || (r.score === cur.score && r.time < cur.time)) {
        bestByName[r.name] = r;
      }
    });
    const sorted = Object.values(bestByName).sort((a, b) => {
      if (b.score !== a.score) return b.score - a.score;
      return a.time - b.time;
    });

    const champion = sorted[0];
    const mins = Math.floor(champion.time / 60);
    const secs = champion.time % 60;
    const timeStr = `${mins}:${secs.toString().padStart(2, "0")}`;

    box.innerHTML = `
      <div>
        <div class="champion-row">
          <span class="champion-title">🏆 目前榜首</span>
          <span class="champion-name">${escapeHtml(champion.name)}</span>
          <span class="champion-score">${champion.score} 分</span>
          <span style="color: #888;">｜ 用時 ${timeStr}</span>
        </div>
        <div class="champion-count">共 ${sorted.length} 位上榜</div>
      </div>
    `;
  } catch (e) {
    box.innerHTML = `<div class="champion-empty">（榜首資訊暫無法載入）</div>`;
  }
}

// ============================================================
// 成績頁：提交成績
// ============================================================
async function submitToLeaderboard() {
  const userId = state.userId || "練習者";
  const r = calcResult();
  const usedTime = TOTAL_TIME_SEC - state.remaining;

  // 老師後台入口
  if (userId === TEACHER_ADMIN_CODE) {
    renderTeacherAdmin();
    document.getElementById("leaderboardSection").style.display = "none";
    return;
  }

  // 測試模式
  if (userId === "練習者" || userId === "") {
    renderTeacherMode();
    await loadAndRenderQStats();
    return;
  }

  // 防刷
  const answered = Object.keys(state.answers).length;
  if (usedTime < 60) {
    renderLeaderboardBlocked("作答時間過短（未滿 1 分鐘），不列入排行榜");
    await loadAndRenderQStats();
    return;
  }
  if (answered < QUESTIONS.length) {
    renderLeaderboardBlocked(`僅完整作答全部 ${QUESTIONS.length} 題者才列入排行榜（您答了 ${answered} 題）`);
    await loadAndRenderQStats();
    return;
  }

  // 準備上傳資料
  const answers = {};
  QUESTIONS.forEach(q => {
    const ans = state.answers[q.id];
    if (ans !== undefined) answers[q.id] = ans;
  });

  const payload = {
    action: "submit",
    subject: SUBJECT_CODE,
    name: userId,
    score: r.score,
    correct: r.correct,
    time: usedTime,
    date: new Date().toISOString().slice(0, 10),
    timestamp: Date.now(),
    answers: answers
  };

  try {
    await apiPost(payload);
    await renderLeaderboard();
    await loadAndRenderQStats();
  } catch (e) {
    console.error("上傳失敗:", e);
    renderLeaderboardBlocked("無法連線排行榜（請檢查網路或重試）");
    await loadAndRenderQStats();
  }
}

async function renderLeaderboard() {
  const container = document.getElementById("leaderboardContent");
  if (!container) return;
  container.innerHTML = `<div class="leaderboard-loading">載入中...</div>`;

  try {
    const result = await apiGet("leaderboard");

    if (records.length === 0) {
      container.innerHTML = `
        <div class="leaderboard-mode-notice">
          <div class="big">🎯 尚無上榜紀錄</div>
          你是第一位作答者！成為榜首等候挑戰吧 🏆
        </div>
      `;
      return;
    }

    const bestByName = {};
    records.forEach(r => {
      const cur = bestByName[r.name];
      if (!cur || r.score > cur.score || (r.score === cur.score && r.time < cur.time)) {
        bestByName[r.name] = r;
      }
    });
    const sorted = Object.values(bestByName).sort((a, b) => {
      if (b.score !== a.score) return b.score - a.score;
      return a.time - b.time;
    });
    const top10 = sorted.slice(0, 10);
    const myName = state.userId;
    const myIndex = sorted.findIndex(r => r.name === myName);

    const medalFor = (r) => r === 1 ? "🥇" : r === 2 ? "🥈" : r === 3 ? "🥉" : r;
    const fmtTime = (s) => `${Math.floor(s/60)}:${(s%60).toString().padStart(2,"0")}`;

    let html = `<table class="leaderboard-table">
      <thead><tr><th class="num">名次</th><th>姓名</th><th class="score">分數</th><th class="time">時間</th></tr></thead>
      <tbody>`;
    top10.forEach((r, i) => {
      const isMe = r.name === myName;
      html += `<tr class="${isMe ? "me" : ""}">
        <td class="num medal">${medalFor(i+1)}</td>
        <td>${escapeHtml(r.name)}</td>
        <td class="score">${r.score}</td>
        <td class="time">${fmtTime(r.time)}</td>
      </tr>`;
    });
    html += `</tbody></table>`;

    if (myIndex >= 10) {
      const me = sorted[myIndex];
      html += `<div class="leaderboard-my-rank">
        你目前排名第 <strong>${myIndex + 1}</strong> 名 ｜ ${me.score} 分 ｜ 用時 ${fmtTime(me.time)}
      </div>`;
    } else if (myIndex >= 0 && myIndex < 10) {
      html += `<div class="leaderboard-my-rank">🎉 你在榜上第 <strong>${myIndex + 1}</strong> 名！</div>`;
    }

    const avg = Math.round(sorted.reduce((s, r) => s + r.score, 0) / sorted.length);
    const passCount = sorted.filter(r => r.score >= 70).length;
    const passRate = Math.round(passCount / sorted.length * 100);
    html += `<div class="leaderboard-stats">📊 共 ${sorted.length} 位上榜 ｜ 平均 ${avg} 分 ｜ 通過率 ${passRate}%</div>`;
    container.innerHTML = html;
  } catch (e) {
    container.innerHTML = `
      <div class="leaderboard-mode-notice">
        <div class="big">⚠️ 載入失敗</div>
        ${escapeHtml(e.message || "未知錯誤")}
      </div>
    `;
  }
}

async function refreshLeaderboard() {
  await renderLeaderboard();
}

// ============================================================
// 題目統計
// ============================================================
async function loadAndRenderQStats() {
  try {
    const result = await apiGet("qstats");
    window._qstatsCache = result.stats || {};
  } catch (e) {
    window._qstatsCache = {};
  }
  const reviewList = document.getElementById("reviewList");
  if (reviewList) {
    reviewList.innerHTML = renderReviewList();
  }
}

// ============================================================
// 老師後台
// ============================================================
async function renderTeacherAdmin() {
  const container = document.getElementById("teacherAdminSection");
  if (!container) return;
  container.innerHTML = `
    <div class="teacher-admin-panel">
      <h4>🔐 老師後台（管理模式）</h4>
      <div id="adminContent">載入中...</div>
    </div>
  `;

  try {
    const result = await apiGet("leaderboard");
    const records = result.records || [];
    records.sort((a, b) => b.timestamp - a.timestamp);

    let html = `<div>全部 ${records.length} 筆紀錄 ｜ <button onclick="exportCSV()">匯出 CSV</button></div>
      <div style="margin-top:10px; max-height:400px; overflow-y:auto;">`;

    records.forEach(r => {
      const t = new Date(r.timestamp).toLocaleString("zh-TW");
      const mins = Math.floor(r.time / 60);
      const secs = r.time % 60;
      html += `<div class="admin-row">
        <div>
          <strong>${escapeHtml(r.name)}</strong>
          - ${r.score} 分 (${r.correct}/50) - ${mins}:${secs.toString().padStart(2,"0")}
          <br><small style="color:#999;">${t}</small>
        </div>
      </div>`;
    });

    html += `</div>
      <div style="margin-top:10px; font-size:11px; color:#95a5a6;">
        💡 提示：刪除資料請直接到 Google Sheet 編輯；批量清空請清空 scores 分頁的第 2 列以下資料。
      </div>`;
    document.getElementById("adminContent").innerHTML = html;
  } catch (e) {
    document.getElementById("adminContent").innerHTML = `❌ 載入失敗: ${e.message}`;
  }
}

async function exportCSV() {
  try {
    const result = await apiGet("leaderboard");
    const records = result.records || [];
    records.sort((a, b) => b.timestamp - a.timestamp);
    let csv = "姓名,分數,答對題數,作答秒數,日期,時間戳記\n";
    records.forEach(r => {
      csv += `"${r.name}",${r.score},${r.correct},${r.time},${r.date},${r.timestamp}\n`;
    });
    const blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `leaderboard_${SUBJECT_CODE}_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  } catch (e) {
    alert("匯出失敗: " + e.message);
  }
}

function setFilter(f) {
  state.filter = f;
  // 重新渲染整個結果頁以更新篩選按鈕 active 狀態
  renderResult();
}

function renderReviewList() {
  return QUESTIONS.map((q, idx) => {
    const userAns = state.answers[q.id];
    const isBlank = userAns === undefined;
    const isCorrect = !isBlank && userAns === q.ans;
    const isWrong = !isBlank && !isCorrect;

    if (state.filter === "wrong" && !isWrong) return "";
    if (state.filter === "blank" && !isBlank) return "";
    if (state.filter === "correct" && !isCorrect) return "";

    let itemCls = "review-item";
    let badgeCls, badgeText;
    if (isCorrect) { badgeCls = "correct"; badgeText = "✓ 答對"; }
    else if (isBlank) { itemCls += " blank"; badgeCls = "blank"; badgeText = "— 未作答"; }
    else { itemCls += " wrong"; badgeCls = "wrong"; badgeText = "✗ 答錯"; }

    // 取得本題社群統計
    const qstat = (window._qstatsCache && window._qstatsCache["q" + q.id]) || null;
    const qstatTotal = qstat ? (qstat[0] + qstat[1] + qstat[2] + qstat[3]) : 0;

    const opts = q.opts.map((opt, i) => {
      let optCls = "review-opt";
      let tag = "";
      if (i === q.ans && i === userAns) {
        optCls += " user-correct";
        tag = "← 您的答案 ✓";
      } else if (i === q.ans) {
        optCls += " correct-ans";
        tag = "← 正解";
      } else if (i === userAns) {
        optCls += " user-wrong";
        tag = "← 您的答案 ✗";
      }
      let statBar = "";
      if (qstat && qstatTotal > 0) {
        const cnt = qstat[i];
        const pct = Math.round(cnt / qstatTotal * 100);
        const barCls = i === q.ans ? "stat-correct" : (cnt === Math.max(...qstat) && cnt > 0 && i !== q.ans ? "stat-top-wrong" : "stat-normal");
        statBar = `<span class="opt-stat ${barCls}">${cnt} 人 / ${pct}%</span>`;
      }
      return `
        <div class="${optCls}">
          <span class="opt-marker">(${String.fromCharCode(65+i)})</span>
          <span class="opt-text">${escapeHtml(opt)}</span>
          ${tag ? `<span class="opt-tag">${tag}</span>` : ""}
          ${statBar}
        </div>
      `;
    }).join("");

    let qstatHeader = "";
    if (qstat && qstatTotal > 0) {
      const correctCnt = qstat[q.ans];
      const correctPct = Math.round(correctCnt / qstatTotal * 100);
      qstatHeader = `<div class="review-qstat">📊 社群作答：共 ${qstatTotal} 人 ｜ 答對率 ${correctPct}%</div>`;
    }

    return `
      <div class="${itemCls}">
        <div class="review-header">
          <span class="rq-num">Q${(idx+1).toString().padStart(2,"0")}</span>
          <span class="rq-cat">${q.cat}. ${CAT_NAMES[q.cat]}</span>
          <span class="rq-badge ${badgeCls}">${badgeText}</span>
          ${state.marked[q.id] ? '<span class="rq-badge" style="background:#fff4d0;color:#a08020;">★ 曾標記</span>' : ''}
        </div>
        <div class="review-stem">${escapeHtml(q.stem)}</div>
        ${qstatHeader}
        <div class="review-opts">${opts}</div>
        <div class="review-expl">
          <span class="expl-label">解析：</span>${escapeHtml(q.expl)}
        </div>
      </div>
    `;
  }).join("") || `<div style="padding:40px;text-align:center;color:#888;">此分類目前沒有題目</div>`;
}

function retakeExam() {
  state.currentIdx = 0;
  state.answers = {};
  state.marked = {};
  state.zoomLevel = 1;
  state.startTime = null;
  state.remaining = TOTAL_TIME_SEC;
  state.submitted = false;
  state.filter = "all";
  if (state.timerId) clearInterval(state.timerId);
  renderLogin();
}

// ============================================================
// 鍵盤快捷鍵
// ============================================================
document.addEventListener("keydown", (e) => {
  if (state.stage !== "exam") return;
  // 1-4 或 A-D 選答
  const keyMap = { "1":0,"2":1,"3":2,"4":3,"a":0,"b":1,"c":2,"d":3,"A":0,"B":1,"C":2,"D":3 };
  if (keyMap[e.key] !== undefined) {
    selectAnswer(keyMap[e.key]);
    renderExam();
    return;
  }
  if (e.key === "ArrowLeft") prevQuestion();
  else if (e.key === "ArrowRight") nextQuestion();
});

// 啟動
renderLogin();
